<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<!-- 핀치 줌 허용(레벨2용): user-scalable=yes -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />
<title>밤바다</title>
<style>
  :root{
    --bg:#0e1320; --bg2:#141b2e; --ink:#e7ecf5; --dim:#8a96ad;
    --accent:#e3a542; --line:#283248; --ok:#6f7a37; --bad:#bf5830;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;}
  body{min-height:100dvh; display:flex; flex-direction:column; align-items:center;
    padding:24px 18px 56px; line-height:1.6;}
  .wrap{width:100%; max-width:440px;}
  .langbar{display:flex; justify-content:flex-end; gap:6px; margin-bottom:6px;}
  .langbar button{background:transparent; border:1px solid var(--line); color:var(--dim);
    border-radius:7px; padding:3px 9px; font-size:11px;}
  .langbar button.on{color:var(--accent); border-color:var(--accent);}
  header{text-align:center; margin:8px 0 22px;}
  header h1{font-size:20px; letter-spacing:.06em; margin:0; color:var(--accent);}
  header p{font-size:12px; color:var(--dim); margin:6px 0 0;}
  .level{background:var(--bg2); border:1px solid var(--line); border-radius:16px;
    padding:22px 18px; margin:0 0 16px; display:none;}
  .level.active{display:block;}
  .tag{font-size:11px; color:var(--dim); letter-spacing:.12em;}
  .riddle{font-size:16px; margin:10px 0 18px; white-space:pre-line;}
  .hint{font-size:12px; color:var(--dim); margin-top:4px;}
  /* 입력 */
  .ans{display:flex; gap:8px; margin-top:16px;}
  .ans input{flex:1; min-width:0; background:#0b0f1a; border:1px solid var(--line);
    color:var(--ink); border-radius:10px; padding:12px 12px; font-size:16px;}
  .ans button{background:var(--accent); color:#1a1206; border:0; border-radius:10px;
    padding:0 16px; font-size:15px; font-weight:700;}
  .msg{font-size:13px; min-height:18px; margin-top:10px;}
  .msg.ok{color:var(--ok);} .msg.bad{color:var(--bad);}
  /* L1 길게 누르기 박스 */
  .press{user-select:none; -webkit-user-select:none; text-align:center;
    background:#0b0f1a; border:1px dashed var(--line); border-radius:12px;
    padding:26px 14px; color:var(--dim); font-size:14px; touch-action:none;}
  .press .reveal{display:none; color:var(--accent); font-size:18px; letter-spacing:.05em;}
  .press.lit .label{display:none;} .press.lit .reveal{display:inline;}
  /* L2 깨알 단서 */
  .scroll{background:#0b0f1a; border:1px solid var(--line); border-radius:12px;
    padding:16px; font-size:13px; color:var(--dim);}
  .tiny{font-size:3px; line-height:1; color:#c5ab8d;} /* 확대해야 읽힘 */
  /* L3 기울이기 */
  .tilt{text-align:center; background:#0b0f1a; border:1px solid var(--line);
    border-radius:12px; padding:24px 14px; transition:opacity .2s;}
  .tilt .secret{opacity:0; transition:opacity .25s; color:var(--accent);
    font-size:18px; letter-spacing:.05em;}
  .tilt.show .secret{opacity:1;}
  .gauge{font-size:11px; color:var(--dim); margin-top:10px;}
  .sensorBtn{margin-top:14px; background:transparent; color:var(--accent);
    border:1px solid var(--accent); border-radius:10px; padding:10px 14px; font-size:13px;}
  /* L4 불기(돛) */
  .sailbox{text-align:center; background:#0b0f1a; border:1px solid var(--line);
    border-radius:12px; padding:24px 14px;}
  .sail{font-size:46px; line-height:1; filter:grayscale(1) opacity(.4); transition:.15s;}
  .windmeter{height:8px; background:var(--line); border-radius:5px; margin-top:16px; overflow:hidden;}
  .windmeter .fill{height:100%; width:0%; background:var(--accent); transition:width .12s;}
  /* L5 항로 그리기(canvas) */
  #routeCanvas{display:block; width:100%; height:200px; background:#0b0f1a;
    border:1px solid var(--line); border-radius:12px; touch-action:none;}
  #l5-reveal{opacity:0; transition:opacity .3s; color:var(--accent); text-align:center;
    font-size:18px; letter-spacing:.05em; margin-top:12px;}
  #l5-reveal.show{opacity:1;}
  /* L6 등불 감싸기 */
  .flamebox{text-align:center; background:#0b0f1a; border:1px solid var(--line);
    border-radius:12px; padding:24px 14px; touch-action:none;}
  .flame{font-size:44px; line-height:1; display:inline-block;
    animation:flicker .25s infinite alternate;}
  .flame.steady{animation:none; transform:none;}
  @keyframes flicker{ from{transform:translateX(-2px) rotate(-5deg); opacity:.55;}
    to{transform:translateX(2px) rotate(5deg); opacity:.9;} }
  .shelter{height:8px; background:var(--line); border-radius:5px; margin-top:16px; overflow:hidden;}
  .shelter .fill{height:100%; width:0%; background:var(--accent); transition:width .12s;}
  /* L7 좌우 노 젓기 */
  .rowbox{display:flex; align-items:center; gap:10px; background:#0b0f1a;
    border:1px solid var(--line); border-radius:12px; padding:18px 12px;}
  .oar{flex:0 0 66px; height:88px; background:#141b2e; border:1px solid var(--line);
    border-radius:12px; color:var(--dim); font-size:26px; touch-action:none; transition:.1s;}
  .oar.next{border-color:var(--accent); color:var(--accent); animation:oarpulse 1s infinite;}
  .oar.stroke{transform:scale(.92); background:var(--accent); color:#1a1206;}
  @keyframes oarpulse{0%,100%{opacity:1;} 50%{opacity:.5;}}
  .rowmid{flex:1; text-align:center;}
  .boat{font-size:34px; transition:transform .15s;}
  .rowmeter{height:8px; background:var(--line); border-radius:5px; margin-top:12px; overflow:hidden;}
  .rowmeter .fill{height:100%; width:0%; background:var(--accent); transition:width .15s;}
  .clear{text-align:center; padding:30px 12px;}
  .clear h2{color:var(--accent); margin:0 0 8px;}
  .dots{display:flex; gap:6px; justify-content:center; margin-bottom:18px;}
  .dots i{width:8px; height:8px; border-radius:50%; background:var(--line);}
  .dots i.on{background:var(--accent);}
  .reset{display:block; margin:0 auto 14px; background:transparent; color:var(--dim);
    border:1px solid var(--line); border-radius:8px; padding:5px 10px; font-size:11px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="langbar">
    <button data-lang="ko">한</button>
    <button data-lang="en">EN</button>
  </div>
  <header>
    <h1 id="t-title"></h1>
    <p id="t-subtitle"></p>
  </header>
  <div class="dots" id="dots"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
  <button id="resetBtn" class="reset"></button>

  <!-- LEVEL 1 : 길게 누르기 (튜토리얼) -->
  <section class="level active" id="lv1">
    <div class="tag" id="l1-tag"></div>
    <div class="riddle" id="l1-riddle"></div>
    <div class="press" id="pressBox">
      <span class="label" id="l1-press"></span>
      <span class="reveal" id="l1-reveal"></span>
    </div>
    <div class="hint" id="l1-hint"></div>
    <div class="ans">
      <input id="in1" inputmode="text" autocomplete="off" />
      <button class="confirmBtn" onclick="check(0,'in1','msg1')"></button>
    </div>
    <div class="msg" id="msg1"></div>
  </section>

  <!-- LEVEL 2 : 핀치 줌 (튜토리얼) -->
  <section class="level" id="lv2">
    <div class="tag" id="l2-tag"></div>
    <div class="riddle" id="l2-riddle"></div>
    <div class="scroll">
      <span id="l2-before"></span>
      <span class="tiny" id="l2-tiny"></span>
      <span id="l2-after"></span>
    </div>
    <div class="hint" id="l2-hint"></div>
    <div class="ans">
      <input id="in2" inputmode="text" autocomplete="off" />
      <button class="confirmBtn" onclick="check(1,'in2','msg2')"></button>
    </div>
    <div class="msg" id="msg2"></div>
  </section>

  <!-- LEVEL 3 : 폰 기울이기 (튜토리얼) -->
  <section class="level" id="lv3">
    <div class="tag" id="l3-tag"></div>
    <div class="riddle" id="l3-riddle"></div>
    <div class="tilt" id="tiltBox">
      <span class="secret" id="l3-secret"></span>
      <div class="gauge" id="gauge"></div>
    </div>
    <button class="sensorBtn" id="sensorBtn"></button>
    <div class="hint" id="l3-hint"></div>
    <div class="ans">
      <input id="in3" inputmode="text" autocomplete="off" />
      <button class="confirmBtn" onclick="check(2,'in3','msg3')"></button>
    </div>
    <div class="msg" id="msg3"></div>
  </section>

  <!-- LEVEL 4 : 불기(돛) — 출항 -->
  <section class="level" id="lv4">
    <div class="tag" id="l4-tag"></div>
    <div class="riddle" id="l4-riddle"></div>
    <div class="sailbox">
      <div class="sail" id="sail">⛵</div>
      <div class="windmeter"><div class="fill" id="windFill"></div></div>
      <div class="gauge" id="windGauge"></div>
    </div>
    <button class="sensorBtn" id="windBtn"></button>
    <button class="sensorBtn" id="oarBtn" style="display:none"></button>
    <div class="hint" id="l4-hint"></div>
  </section>

  <!-- LEVEL 5 : 손가락 긋기(항로 그리기) -->
  <section class="level" id="lv5">
    <div class="tag" id="l5-tag"></div>
    <div class="riddle" id="l5-riddle"></div>
    <canvas id="routeCanvas"></canvas>
    <div id="l5-reveal"></div>
    <button class="sensorBtn" id="routeClearBtn"></button>
    <div class="hint" id="l5-hint"></div>
    <div class="ans">
      <input id="in5" inputmode="text" autocomplete="off" />
      <button class="confirmBtn" onclick="check(3,'in5','msg5')"></button>
    </div>
    <div class="msg" id="msg5"></div>
  </section>

  <!-- LEVEL 6 : 두 손가락 감싸기(등불 보살핌) — 2막 안개 -->
  <section class="level" id="lv6">
    <div class="tag" id="l6-tag"></div>
    <div class="riddle" id="l6-riddle"></div>
    <div class="flamebox" id="flameBox">
      <div class="flame" id="flame">🕯️</div>
      <div class="shelter"><div class="fill" id="flameFill"></div></div>
      <div class="gauge" id="flameGauge"></div>
    </div>
    <button class="sensorBtn" id="shelterBtn"></button>
    <div class="hint" id="l6-hint"></div>
  </section>

  <!-- LEVEL 7 : 좌우 노 젓기 — 3막 폭풍 -->
  <section class="level" id="lv7">
    <div class="tag" id="l7-tag"></div>
    <div class="riddle" id="l7-riddle"></div>
    <div class="rowbox">
      <button class="oar" id="oarL">🚣</button>
      <div class="rowmid">
        <div class="boat" id="rowBoat">⛵</div>
        <div class="rowmeter"><div class="fill" id="rowFill"></div></div>
      </div>
      <button class="oar" id="oarR">🚣</button>
    </div>
    <div class="gauge" id="rowGauge"></div>
    <div class="hint" id="l7-hint"></div>
  </section>

  <!-- CLEAR -->
  <section class="level" id="done">
    <div class="clear">
      <h2 id="done-title"></h2>
      <p id="done-body"></p>
      <p id="done-end" style="color:var(--dim);font-size:12px;margin-top:18px;"></p>
    </div>
  </section>
</div>

<script>
  /* ===== i18n 사전 — 새 레벨/트릭은 여기에 키만 추가하면 다국어 자동 적용 ===== */
  const I18N = {
    ko: {
      title:"밤바다",
      subtitle:"",
      reset:"↻ 처음부터",
      confirm:"확인",
      placeholder:"암호 입력",
      ok:"맞다. 다음으로.",
      bad:"아니다. 다시.",
      gaugeInit:"기울기: —",
      gaugePrefix:"기울기: ",
      sensor:"📲 탭해서 센서 켜기 (iOS)",
      l1tag:"출항 · 어두운 항구",
      l1riddle:"🌑 누군가를 배웅하러 왔다. 허나 항구는 아직 어둠.\n빛은, 가만히 오래 닿아야 든다.",
      l1press:"꾹 — 눌러본다",
      l1reveal:"달빛",
      l1hint:"힌트: 화면을 *길게* 눌러라.",
      l2tag:"출항 · 젖은 항해일지",
      l2riddle:"📜 진실은 깨알처럼 작다.\n두 손가락으로, 키워서 읽어라.",
      l2before:"파도가 밤새 종이를 적신다. 글씨는 번지고, 대부분은 의미가 없다.",
      l2tiny:"암호는 등대",
      l2after:"그래도 한 줄, 아주 작은 한 줄만은 끝까지 남았다.",
      l2hint:"힌트: 회색 글상자를 *핀치 줌*으로 확대해.",
      l3tag:"출항 · 키를 잡고",
      l3riddle:"📱 똑바로 보면 안 보인다.\n폰을 옆으로 기울여, 수면을 맞춰라.",
      l3secret:"수평선",
      l3hint:"힌트: 폰을 좌우로 약 45° *기울이면* 드러난다.",
      l4tag:"출항 · 돛을 펴다",
      l4riddle:"🌬️ 이제 정말 떠난다. 돛이 늘어져 있다 —\n숨을 보태야, 배가 나아간다.",
      l4hint:"힌트: 폰 마이크에 대고 *후— 불어라.* (돛이 차오르면 출항)",
      l4windPrefix:"바람: ",
      l4windBtn:"🎤 마이크 켜고 출항 준비",
      l4set:"돛이 부푼다… 출항 🌊",
      l4oar:"마이크 없이 — 노를 저어 출발",
      l5tag:"출항 · 첫 물길",
      l5riddle:"✦ 어둠뿐인 바다. 길잡이는 하늘에 있다.\n흩어진 별을 손가락으로 이어, 길을 그려라.",
      l5hint:"힌트: 손가락으로 별을 *모두 잇도록* 그어라. (안 되면 ‘다시 긋기’)",
      l5clear:"↺ 다시 긋기",
      l5reveal:"북극성",
      l6tag:"안개 1 · 등불 감싸기",
      l6riddle:"🌫️ 안개가 짙다. 작은 등불 하나가 바람에 휘청인다.\n두 손가락으로 감싸, 불꽃을 지켜라.",
      l6hint:"힌트: 두 손가락을 등불 양옆에 모아 *감싸라.* (한 손이면 아래 ‘가리기’를 길게 눌러)",
      l6shelterPrefix:"보호: ",
      l6shelterBtn:"🤚 한 손으로 가리기 (길게)",
      l6set:"불꽃이 잦아들지 않는다… 곁에 온기가 머문다 🕯️",
      l7tag:"폭풍 1 · 노 젓기",
      l7riddle:"🌊 파도가 거세다. 혼자선 못 건넌다.\n동행과 박자를 맞춰, 좌우로 번갈아 노를 저어라.",
      l7hint:"힌트: 빛나는 쪽 노를 *좌우 번갈아* 눌러 저어라.",
      l7rowPrefix:"전진: ",
      l7set:"폭풍을 넘었다… 멀리, 별이 보인다 ✦",
      doneTitle:"항해 🌅",
      doneBody:"달빛과 별, 바람과 등불, 그리고 폭풍을 넘어.<br>밤바다 한가운데, 잠시 숨을 고른다.",
      doneEnd:"— 다음 항해(작별)는 곧 —",
      answers:["달빛","등대","수평선","북극성"]
    },
    en: {
      title:"Night Sea",
      subtitle:"",
      reset:"↻ Restart",
      confirm:"Enter",
      placeholder:"passcode",
      ok:"Correct. Onward.",
      bad:"No. Try again.",
      gaugeInit:"tilt: —",
      gaugePrefix:"tilt: ",
      sensor:"📲 Tap to enable sensor (iOS)",
      l1tag:"SET SAIL · the dark harbor",
      l1riddle:"🌑 You came to see someone off — but the harbor is still dark.\nLight comes only to what waits, long and still.",
      l1press:"press — and hold",
      l1reveal:"moonlight",
      l1hint:"Hint: *press and hold* the screen.",
      l2tag:"SET SAIL · the soaked logbook",
      l2riddle:"📜 The truth is fine as a grain.\nPinch with two fingers to read it.",
      l2before:"Waves soak the paper all night. The ink bleeds; most of it means nothing.",
      l2tiny:"the passcode is lighthouse",
      l2after:"Yet one line, the smallest line, survived to the end.",
      l2hint:"Hint: *pinch-zoom* the gray box.",
      l3tag:"SET SAIL · take the helm",

      l3hint:"Hint: tilt the phone left/right ~45° to reveal it.",
      l4tag:"SET SAIL · raise the sail",
      l4riddle:"🌬️ Now you truly leave. The sail hangs limp —\nadd your breath, and the boat moves.",

      l4windBtn:"🎤 Enable mic & prepare to sail",
      l4set:"The sail swells… setting sail 🌊",
      l4oar:"No mic — row out with the oars",
      l5tag:"SET SAIL · the first channel",
      l5riddle:"✦ Nothing but dark sea. The guide is in the sky.\nConnect the scattered stars with your finger to draw the way.",

      l5clear:"↺ redraw",
      l5reveal:"polaris",
      l6tag:"FOG 1 · shelter the flame",
      l6riddle:"🌫️ The fog is thick. A small lantern wavers in the wind.\nCup it with two fingers and keep the flame alive.",
      l6hint:"Hint: bring two fingers around the lantern to *shelter* it. (one hand? press & hold ‘shield’ below)",
      l6shelterPrefix:"shelter: ",
      l6shelterBtn:"🤚 shield with one hand (hold)",
      l6set:"The flame holds steady… a warmth stays beside you 🕯️",
      l7tag:"STORM 1 · row",
      l7riddle:"🌊 The waves are fierce — you can't cross alone.\nMatch your companion's rhythm: pull the oars, left and right in turn.",
      l7hint:"Hint: tap the *glowing* oar, alternating left and right.",
      l7rowPrefix:"progress: ",
      l7set:"Through the storm… far off, stars appear ✦",
      doneTitle:"Voyage 🌅",
      doneBody:"Moonlight and stars, wind and lantern, and through the storm.<br>Mid–night-sea, you catch your breath.",
      doneEnd:"— the next voyage (farewell) comes soon —",
      answers:["moonlight","lighthouse","horizon","polaris"]
    }
  };

  const $ = id => document.getElementById(id);
  const setT = (id,t) => { const e=$(id); if(e) e.textContent=t; };
  let CUR = I18N.ko;
  const LANG_KEY = "mobilemaze.lang";

  function detectLang(){
    const saved = localStorage.getItem(LANG_KEY);
    if(saved && I18N[saved]) return saved;
    return (navigator.language||"ko").toLowerCase().startsWith("ko") ? "ko" : "en";
  }

  function applyLang(lang){
    if(!I18N[lang]) lang="ko";
    CUR = I18N[lang];
    document.documentElement.lang = lang;
    try{ localStorage.setItem(LANG_KEY, lang); }catch(e){}

    setT("t-title",CUR.title); setT("resetBtn",CUR.reset);
    const sub=$("t-subtitle"); if(sub){ sub.textContent=CUR.subtitle||""; sub.style.display=CUR.subtitle?"":"none"; }
    setT("l1-tag",CUR.l1tag); setT("l1-riddle",CUR.l1riddle); setT("l1-press",CUR.l1press);
    setT("l1-reveal",CUR.l1reveal); setT("l1-hint",CUR.l1hint);
    setT("l2-tag",CUR.l2tag); setT("l2-riddle",CUR.l2riddle); setT("l2-before",CUR.l2before);
    setT("l2-tiny",CUR.l2tiny); setT("l2-after",CUR.l2after); setT("l2-hint",CUR.l2hint);
    setT("l3-tag",CUR.l3tag); setT("l3-riddle",CUR.l3riddle); setT("l3-secret",CUR.l3secret);
    setT("l3-hint",CUR.l3hint); setT("sensorBtn",CUR.sensor); setT("gauge",CUR.gaugeInit);
    setT("l4-tag",CUR.l4tag); setT("l4-riddle",CUR.l4riddle); setT("l4-hint",CUR.l4hint);
    setT("windBtn",CUR.l4windBtn); setT("oarBtn",CUR.l4oar); setT("windGauge",CUR.l4windPrefix+"0%");
    setT("l5-tag",CUR.l5tag); setT("l5-riddle",CUR.l5riddle); setT("l5-hint",CUR.l5hint);
    setT("l5-reveal",CUR.l5reveal); setT("routeClearBtn",CUR.l5clear);
    setT("l6-tag",CUR.l6tag); setT("l6-riddle",CUR.l6riddle); setT("l6-hint",CUR.l6hint);
    setT("shelterBtn",CUR.l6shelterBtn); setT("flameGauge",CUR.l6shelterPrefix+"0%");
    setT("l7-tag",CUR.l7tag); setT("l7-riddle",CUR.l7riddle); setT("l7-hint",CUR.l7hint);
    setT("rowGauge",CUR.l7rowPrefix+"0%");
    setT("done-title",CUR.doneTitle); setT("done-end",CUR.doneEnd);
    $("done-body").innerHTML = CUR.doneBody;
    document.querySelectorAll(".confirmBtn").forEach(b=>b.textContent=CUR.confirm);
    ["in1","in2","in3","in5"].forEach(id=>{ const e=$(id); if(e) e.placeholder=CUR.placeholder; });
    document.querySelectorAll(".langbar button").forEach(b=>
      b.classList.toggle("on", b.dataset.lang===lang));
  }
  document.querySelectorAll(".langbar button").forEach(b=>
    b.addEventListener("click",()=>applyLang(b.dataset.lang)));

  /* ===== 정답 확인 (정답은 현재 언어 사전에서) ===== */
  const norm = s => (s||"").trim().toLowerCase();
  function check(i, inId, msgId){
    const v = norm($(inId).value);
    const m = $(msgId);
    if(v === norm(CUR.answers[i])){
      m.className="msg ok"; m.textContent=CUR.ok;
      setTimeout(advance, 600);
    } else {
      m.className="msg bad"; m.textContent=CUR.bad;
    }
  }

  /* ===== 진행/네비 — 현재 레벨 기준(정답 인덱스와 분리) ===== */
  const SAVE_KEY="mobilemaze.progress";
  const ORDER=["lv1","lv2","lv3","lv4","lv5","lv6","lv7","done"];
  let curIdx = 0;
  function show(idx){
    idx=Math.max(0,Math.min(idx,ORDER.length-1));
    curIdx = idx;
    if(ORDER[idx]!=="lv4") stopMic();        // 돛 레벨을 떠나면 마이크 정리
    if(ORDER[idx]!=="lv6") flameStop();      // 등불 레벨을 떠나면 루프 정리
    document.querySelectorAll(".level").forEach(el=>el.classList.remove("active"));
    $(ORDER[idx]).classList.add("active");
    document.querySelectorAll("#dots i").forEach((d,k)=>d.classList.toggle("on", k<idx));
    window.scrollTo(0,0);
    if(ORDER[idx]==="lv5") routeInit();       // 항로 캔버스는 보일 때 크기/렌더
    if(ORDER[idx]==="lv6") flameInit();       // 등불 감싸기 루프 시작
    if(ORDER[idx]==="lv7") rowInit();         // 노 젓기 준비
    try{ localStorage.setItem(SAVE_KEY,String(idx)); }catch(e){}
  }
  function advance(){ show(curIdx+1); }
  function loadProgress(){ const v=parseInt(localStorage.getItem(SAVE_KEY)||"0",10); return isNaN(v)?0:v; }

  /* ===== L4/L5 상태 — show()/resetLevels보다 먼저 선언(TDZ 방지) ===== */
  let audioCtx=null, micStream=null, micRaf=null, sailDone=false;
  let routeCanvas=null, routeCtx=null, routeStars=[], routeStroke=[], routeDrawing=false, routeDone=false;
  let flameShelter=0, flameDone=false, flameSheltering=false, flameBtnHold=false, flameRaf=null, flameBox=null;
  let rowCount=0, rowNeed=12, rowNext='left', rowDone=false, rowBound=false;

  /* 다시하기: 진행뿐 아니라 각 레벨의 일시적 UI 상태까지 초기화 */
  function resetLevels(){
    $("pressBox").classList.remove("lit");            // L1
    $("tiltBox").classList.remove("show");            // L3
    $("gauge").textContent = CUR.gaugeInit;
    sailDone=false; setSail(0,0);                     // L4
    $("windBtn").style.display=""; $("oarBtn").style.display="none";
    routeReset();                                     // L5
    flameReset();                                     // L6
    rowReset();                                       // L7
    ["in1","in2","in3","in5"].forEach(id=>{ const e=$(id); if(e) e.value=""; });
    ["msg1","msg2","msg3","msg5"].forEach(id=>{ const e=$(id); if(e){ e.textContent=""; e.className="msg"; } });
  }

  /* ===== 초기화 ===== */
  applyLang(detectLang());
  show(loadProgress());
  $("resetBtn").addEventListener("click",()=>{
    stopMic(); resetLevels();
    try{ localStorage.removeItem(SAVE_KEY); }catch(e){} show(0);
  });

  /* ===== LEVEL 1 — 길게 누르기(600ms) ===== */
  (function(){
    const box=$("pressBox"); let t=null;
    const start=e=>{ t=setTimeout(()=>box.classList.add("lit"),600); };
    const end=e=>{ clearTimeout(t); };
    box.addEventListener("touchstart",start,{passive:true});
    box.addEventListener("touchend",end);
    box.addEventListener("mousedown",start);
    box.addEventListener("mouseup",end);
    box.addEventListener("mouseleave",end);
  })();

  /* ===== LEVEL 3 — 기울이기(deviceorientation) ===== */
  (function(){
    const box=$("tiltBox"), gauge=$("gauge"), btn=$("sensorBtn");
    function onTilt(e){
      const g = Math.round(e.gamma||0);
      gauge.textContent = CUR.gaugePrefix + g + "°";
      box.classList.toggle("show", Math.abs(g) > 40);
    }
    function enable(){
      if(typeof DeviceOrientationEvent!=="undefined" &&
         typeof DeviceOrientationEvent.requestPermission==="function"){
        DeviceOrientationEvent.requestPermission().then(p=>{
          if(p==="granted"){ window.addEventListener("deviceorientation",onTilt); btn.style.display="none"; }
        }).catch(()=>{});
      } else {
        window.addEventListener("deviceorientation",onTilt); btn.style.display="none";
      }
    }
    btn.addEventListener("click",enable);
    if(typeof DeviceOrientationEvent!=="undefined" &&
       typeof DeviceOrientationEvent.requestPermission!=="function"){
      window.addEventListener("deviceorientation",onTilt);
    }
  })();

  /* ===== LEVEL 4 — 불기(돛): 마이크 소리로 돛 채우기 ===== */
  function setSail(fill){
    $("windFill").style.width = fill + "%";
    const s=$("sail");
    s.style.filter = "grayscale(" + (1-fill/100).toFixed(2) + ") opacity(" + (0.4+0.6*fill/100).toFixed(2) + ")";
    s.style.transform = "scale(" + (1+0.18*fill/100).toFixed(2) + ")";
    $("windGauge").textContent = CUR.l4windPrefix + Math.round(fill) + "%";
  }
  function stopMic(){
    if(micRaf){ cancelAnimationFrame(micRaf); micRaf=null; }
    if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
    if(audioCtx){ try{ audioCtx.close(); }catch(e){} audioCtx=null; }
  }
  function sailComplete(){
    if(sailDone) return; sailDone=true;
    $("windGauge").textContent = CUR.l4set;
    stopMic();
    setTimeout(advance, 800);   // lv4 → lv5
  }
  async function startWind(){
    try{
      micStream = await navigator.mediaDevices.getUserMedia({audio:true});
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      if(audioCtx.state==="suspended") await audioCtx.resume();
      const src = audioCtx.createMediaStreamSource(micStream);
      const analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      src.connect(analyser);
      const data = new Uint8Array(analyser.frequencyBinCount);
      $("windBtn").style.display="none";
      let fill = 0;
      (function loop(){
        analyser.getByteFrequencyData(data);
        let sum=0, n=24;                       // 저주파 에너지 ≈ 입김
        for(let i=2;i<2+n;i++) sum+=data[i];
        const lvl = sum/n;                      // 0..255
        if(lvl > 55) fill = Math.min(100, fill + 3.2);
        else        fill = Math.max(0, fill - 1.4);
        setSail(fill);
        if(fill>=100){ sailComplete(); return; }
        micRaf = requestAnimationFrame(loop);
      })();
    }catch(e){
      $("oarBtn").style.display="block";        // 마이크 거부/불가 → 노 젓기 폴백
    }
  }
  $("windBtn").addEventListener("click",startWind);
  $("oarBtn").addEventListener("click",advance);

  /* ===== LEVEL 5 — 손가락 긋기(항로 그리기): 별을 모두 이으면 길잡이 별이 드러남 ===== */
  function routeInit(){
    if(!routeCanvas){
      routeCanvas = $("routeCanvas");
      routeCtx = routeCanvas.getContext("2d");
      routeStars = [
        {x:0.14,y:0.68,hit:false},{x:0.33,y:0.30,hit:false},
        {x:0.52,y:0.64,hit:false},{x:0.71,y:0.26,hit:false},{x:0.88,y:0.52,hit:false}
      ];
      const down=e=>{ routeDrawing=true; routeAdd(e); };
      const move=e=>{ if(routeDrawing){ e.preventDefault(); routeAdd(e); } };
      const up=()=>{ routeDrawing=false; };
      routeCanvas.addEventListener("pointerdown",down);
      routeCanvas.addEventListener("pointermove",move);
      routeCanvas.addEventListener("pointerup",up);
      routeCanvas.addEventListener("pointerleave",up);
      $("routeClearBtn").addEventListener("click",()=>{ routeReset(); });
    }
    routeSize(); routeRender();
  }
  function routeSize(){
    if(!routeCanvas) return;
    routeCanvas.width = routeCanvas.clientWidth || 320;
    routeCanvas.height = 200;
  }
  function routeAdd(e){
    if(routeDone || !routeCanvas) return;
    const r=routeCanvas.getBoundingClientRect();
    const x=e.clientX-r.left, y=e.clientY-r.top;
    routeStroke.push({x,y});
    routeStars.forEach(s=>{
      const sx=s.x*routeCanvas.width, sy=s.y*routeCanvas.height;
      if(!s.hit && Math.hypot(x-sx,y-sy) < 24) s.hit=true;
    });
    routeRender();
    if(routeStars.length && routeStars.every(s=>s.hit)) routeComplete();
  }
  function routeComplete(){
    if(routeDone) return; routeDone=true;
    $("l5-reveal").classList.add("show");
    routeRender();
  }
  function routeReset(){
    routeStroke=[]; routeDone=false;
    routeStars.forEach(s=>s.hit=false);
    const rv=$("l5-reveal"); if(rv) rv.classList.remove("show");
    routeRender();
  }
  function routeRender(){
    if(!routeCtx) return;
    const w=routeCanvas.width, h=routeCanvas.height;
    routeCtx.clearRect(0,0,w,h);
    if(routeStroke.length>1){
      routeCtx.strokeStyle="rgba(227,165,66,.55)"; routeCtx.lineWidth=3;
      routeCtx.lineCap="round"; routeCtx.lineJoin="round";
      routeCtx.beginPath();
      routeStroke.forEach((p,i)=> i ? routeCtx.lineTo(p.x,p.y) : routeCtx.moveTo(p.x,p.y));
      routeCtx.stroke();
    }
    routeStars.forEach(s=>{
      const sx=s.x*w, sy=s.y*h;
      if(s.hit){
        routeCtx.beginPath(); routeCtx.arc(sx,sy,11,0,7);
        routeCtx.strokeStyle="rgba(227,165,66,.4)"; routeCtx.lineWidth=2; routeCtx.stroke();
      }
      routeCtx.beginPath(); routeCtx.arc(sx,sy, s.hit?6:4, 0, 7);
      routeCtx.fillStyle = s.hit ? "#e3a542" : "#3a4663"; routeCtx.fill();
    });
  }

  /* ===== LEVEL 6 — 두 손가락 감싸기(등불 보살핌): 불씨를 양손으로 감싸 지킨다 ===== */
  function flameRender(){
    $("flameFill").style.width = flameShelter + "%";
    const f=$("flame");
    f.classList.toggle("steady", (flameSheltering||flameBtnHold) && !flameDone);
    f.style.opacity = (0.5 + 0.5*flameShelter/100).toFixed(2);
    $("flameGauge").textContent = CUR.l6shelterPrefix + Math.round(flameShelter) + "%";
  }
  function flameEval(e){
    if(flameDone){ flameSheltering=false; return; }
    const t=e.touches;
    if(t && t.length>=2){
      const d=Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY);
      flameSheltering = d < 180;            // 두 손가락이 등불을 감쌀 만큼 가까움
    } else flameSheltering=false;
  }
  function flameLoop(){
    if(!flameDone){
      if(flameSheltering || flameBtnHold) flameShelter=Math.min(100, flameShelter+2.0);
      else                                flameShelter=Math.max(0, flameShelter-1.1);
      flameRender();
      if(flameShelter>=100){ flameComplete(); return; }
    }
    flameRaf=requestAnimationFrame(flameLoop);
  }
  function flameStop(){ if(flameRaf){ cancelAnimationFrame(flameRaf); flameRaf=null; } }
  function flameComplete(){
    if(flameDone) return; flameDone=true;
    const f=$("flame"); f.classList.add("steady"); f.style.opacity="1";
    $("flameGauge").textContent = CUR.l6set;
    flameStop();
    setTimeout(advance, 1000);              // lv6 → done
  }
  function flameReset(){
    flameShelter=0; flameDone=false; flameSheltering=false; flameBtnHold=false;
    const ff=$("flameFill"); if(ff) ff.style.width="0%";
    const fl=$("flame"); if(fl){ fl.classList.remove("steady"); fl.style.opacity=""; }
    const fg=$("flameGauge"); if(fg) fg.textContent=CUR.l6shelterPrefix+"0%";
  }
  function flameInit(){
    if(!flameBox){
      flameBox=$("flameBox");
      const ev=e=>{ e.preventDefault(); flameEval(e); };
      flameBox.addEventListener("touchstart",ev,{passive:false});
      flameBox.addEventListener("touchmove",ev,{passive:false});
      flameBox.addEventListener("touchend",e=>flameEval(e));
      const b=$("shelterBtn");
      b.addEventListener("pointerdown",()=>{ flameBtnHold=true; });
      b.addEventListener("pointerup",()=>{ flameBtnHold=false; });
      b.addEventListener("pointerleave",()=>{ flameBtnHold=false; });
    }
    if(!flameDone) flameRender();
    flameStop(); flameRaf=requestAnimationFrame(flameLoop);
  }

  /* ===== LEVEL 7 — 좌우 노 젓기(폭풍): 동행과 박자 맞춰 좌우 번갈아 ===== */
  function rowRender(){
    const pct = Math.min(100, Math.round(rowCount / rowNeed * 100));
    $("rowFill").style.width = pct + "%";
    $("oarL").classList.toggle("next", !rowDone && rowNext==='left');
    $("oarR").classList.toggle("next", !rowDone && rowNext==='right');
    const b=$("rowBoat"); if(b) b.style.transform = "translateX(" + (rowNext==='left' ? -3 : 3) + "px)";
    $("rowGauge").textContent = CUR.l7rowPrefix + pct + "%";
  }
  function rowStroke(side){
    if(rowDone || side !== rowNext) return;     // 좌우 번갈아만 인정(틀려도 벌점 없음)
    rowCount++; rowNext = side==='left' ? 'right' : 'left';
    const o = side==='left' ? $("oarL") : $("oarR");
    o.classList.add("stroke"); setTimeout(()=>o.classList.remove("stroke"), 120);
    rowRender();
    if(rowCount >= rowNeed) rowComplete();
  }
  function rowComplete(){
    if(rowDone) return; rowDone=true;
    $("oarL").classList.remove("next"); $("oarR").classList.remove("next");
    $("rowGauge").textContent = CUR.l7set;
    setTimeout(advance, 1000);                  // lv7 → done
  }
  function rowReset(){
    rowCount=0; rowNext='left'; rowDone=false;
    const f=$("rowFill"); if(f) f.style.width="0%";
    ["oarL","oarR"].forEach(id=>{ const o=$(id); if(o) o.classList.remove("stroke","next"); });
    if($("rowGauge")) rowRender();
  }
  function rowInit(){
    if(!rowBound){
      rowBound=true;
      $("oarL").addEventListener("pointerdown",e=>{ e.preventDefault(); rowStroke('left'); });
      $("oarR").addEventListener("pointerdown",e=>{ e.preventDefault(); rowStroke('right'); });
    }
    rowRender();
  }
</script>
</body>
</html>
