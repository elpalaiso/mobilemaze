<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<!-- 핀치 줌 허용(레벨2용): user-scalable=yes -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />
<title>밤바다</title>
<link rel="stylesheet" href="styles.css?v=1781878529" />
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <button id="menuBtn" class="chip">☰ 목록</button>
    <div class="langbar">
      <button data-lang="ko">한</button>
      <button data-lang="en">EN</button>
    </div>
  </div>
  <header>
    <h1 id="t-title"></h1>
    <p id="t-subtitle"></p>
  </header>
  <div id="play">
  <div class="dots" id="dots"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
  <button id="resetBtn" class="reset"></button>

  <!-- LEVEL 1 : 길게 누르기 (튜토리얼) -->
  <section class="level active" id="lv1">
    <div class="tag" id="l1-tag"></div>
    <div class="riddle" id="l1-riddle"></div>
    <div class="press" id="pressBox">
      <span class="label" id="l1-press"></span>
      <span class="reveal" id="l1-reveal"></span>
    </div>
    <div class="hint" id="l1-hint"></div>
    <div class="ans">
      <input id="in1" inputmode="text" autocomplete="off" />
      <button class="confirmBtn" onclick="check('in1','msg1')"></button>
    </div>
    <div class="msg" id="msg1"></div>
  </section>

  <!-- LEVEL 2 : 핀치 줌 (튜토리얼) -->
  <section class="level" id="lv2">
    <div class="tag" id="l2-tag"></div>
    <div class="riddle" id="l2-riddle"></div>
    <div class="scroll">
      <span id="l2-before"></span>
      <span class="tiny" id="l2-tiny"></span>
      <span id="l2-after"></span>
    </div>
    <div class="hint" id="l2-hint"></div>
    <div class="ans">
      <input id="in2" inputmode="text" autocomplete="off" />
      <button class="confirmBtn" onclick="check('in2','msg2')"></button>
    </div>
    <div class="msg" id="msg2"></div>
  </section>

  <!-- LEVEL 3 : 폰 기울이기 (튜토리얼) -->
  <section class="level" id="lv3">
    <div class="tag" id="l3-tag"></div>
    <div class="riddle" id="l3-riddle"></div>
    <div class="tilt" id="tiltBox">
      <span class="secret" id="l3-secret"></span>
      <div class="gauge" id="gauge"></div>
    </div>
    <button class="sensorBtn" id="sensorBtn"></button>
    <div id="tiltFallback" style="display:none; margin-top:12px;">
      <input type="range" id="tiltSlider" min="0" max="100" value="50" style="width:100%;" />
      <div class="hint" id="l3-fallback-hint"></div>
    </div>
    <div class="hint" id="l3-hint"></div>
    <div class="ans">
      <input id="in3" inputmode="text" autocomplete="off" />
      <button class="confirmBtn" onclick="check('in3','msg3')"></button>
    </div>
    <div class="msg" id="msg3"></div>
  </section>

  <!-- LEVEL 4 : 불기(돛) — 출항 -->
  <section class="level" id="lv4">
    <div class="tag" id="l4-tag"></div>
    <div class="riddle" id="l4-riddle"></div>
    <div class="sailbox">
      <div class="sail" id="sail">⛵</div>
      <div class="windmeter"><div class="fill" id="windFill"></div></div>
      <div class="gauge" id="windGauge"></div>
    </div>
    <button class="sensorBtn" id="windBtn"></button>
    <button class="sensorBtn" id="oarBtn" style="display:none"></button>
    <div class="hint" id="l4-hint"></div>
  </section>

  <!-- LEVEL 5 : 손가락 긋기(항로 그리기) -->
  <section class="level" id="lv5">
    <div class="tag" id="l5-tag"></div>
    <div class="riddle" id="l5-riddle"></div>
    <canvas id="routeCanvas"></canvas>
    <div id="l5-reveal"></div>
    <button class="sensorBtn" id="routeClearBtn"></button>
    <div class="hint" id="l5-hint"></div>
    <div class="ans">
      <input id="in5" inputmode="text" autocomplete="off" />
      <button class="confirmBtn" onclick="check('in5','msg5')"></button>
    </div>
    <div class="msg" id="msg5"></div>
  </section>

  <!-- LEVEL 6 : 두 손가락 감싸기(등불 보살핌) — 2막 안개 -->
  <section class="level" id="lv6">
    <div class="tag" id="l6-tag"></div>
    <div class="riddle" id="l6-riddle"></div>
    <div class="flamebox" id="flameBox">
      <div class="flame" id="flame">🕯️</div>
      <div class="shelter"><div class="fill" id="flameFill"></div></div>
      <div class="gauge" id="flameGauge"></div>
    </div>
    <button class="sensorBtn" id="shelterBtn"></button>
    <div class="hint" id="l6-hint"></div>
  </section>

  <!-- LEVEL 7 : 좌우 노 젓기 — 3막 폭풍 -->
  <section class="level" id="lv7">
    <div class="tag" id="l7-tag"></div>
    <div class="riddle" id="l7-riddle"></div>
    <div class="rowbox">
      <button class="oar" id="oarL">🚣</button>
      <div class="rowmid">
        <div class="boat" id="rowBoat">⛵</div>
        <div class="rowmeter"><div class="fill" id="rowFill"></div></div>
      </div>
      <button class="oar" id="oarR">🚣</button>
    </div>
    <div class="gauge" id="rowGauge"></div>
    <div class="hint" id="l7-hint"></div>
  </section>

  <!-- LEVEL 8 : 작별(졸업 연주) — 4막 -->
  <section class="level" id="lv8">
    <div class="tag" id="l8-tag"></div>
    <div class="riddle" id="l8-line"></div>
    <div style="text-align:center; background:#0b0f1a; border:1px solid var(--line); border-radius:12px; padding:30px 14px;">
      <div id="fwScene" style="font-size:48px; line-height:1; transition:.3s;">🕯️</div>
    </div>
    <button class="sensorBtn" id="fwBtn"></button>
    <div class="hint" id="l8-hint"></div>
  </section>

  <!-- 신규 트릭: 체온 나누기(warm) — 첫눈 호수 -->
  <section class="level" id="lvWarm">
    <div class="tag" id="warm-tag"></div>
    <div class="riddle" id="warm-riddle"></div>
    <div class="warmbox" id="warmBox">
      <div class="dog" id="dog">🐕</div>
      <div class="shelter"><div class="fill" id="warmFill"></div></div>
      <div class="gauge" id="warmGauge"></div>
    </div>
    <div class="hint" id="warm-hint"></div>
  </section>

  <!-- 신규 트릭: 종이배 접기(fold) — 새벽 강 -->
  <section class="level" id="lvFold">
    <div class="tag" id="fold-tag"></div>
    <div class="riddle" id="fold-riddle"></div>
    <div class="foldbox" id="foldBox">
      <div class="paper" id="foldPaper">📄</div>
      <div class="gauge" id="foldGauge"></div>
    </div>
    <div class="hint" id="fold-hint"></div>
  </section>

  <!-- 신규 트릭: 나란히 젓기(rowpar) — 새벽 강 -->
  <section class="level" id="lvRowPar">
    <div class="tag" id="rp-tag"></div>
    <div class="riddle" id="rp-riddle"></div>
    <div class="rowbox">
      <button class="oar" id="rpL">🚣</button>
      <div class="rowmid">
        <div class="boat" id="rpBoat">⛵</div>
        <div class="rowmeter"><div class="fill" id="rpFill"></div></div>
      </div>
      <button class="oar" id="rpR">🚣</button>
    </div>
    <button class="sensorBtn" id="rpSyncBtn" style="display:none"></button>
    <div class="gauge" id="rpGauge"></div>
    <div class="hint" id="rp-hint"></div>
  </section>

  <!-- CLEAR — 엔딩 3박: 도착 → 잔류 → 공유 카드 -->
  <section class="level" id="done">
    <div class="clear ending">
      <div class="end-arrival">
        <h2 id="done-title"></h2>
        <p id="done-body"></p>
      </div>
      <div class="end-stay" id="endStayBeat">
        <div class="dock-light"></div>
        <p id="end-coda"></p>
        <p id="end-stay"></p>
      </div>
      <div class="end-card" id="endCard">
        <h3 id="share-title"></h3>
        <p id="share-body"></p>
        <button id="shareBtn" class="share-btn"></button>
        <button id="backHarborBtn" class="back-harbor"></button>
      </div>
      <p id="done-end"></p>
    </div>
  </section>
  </div><!-- /play -->

  <section id="hub" style="display:none;">
    <div id="hubTitle"></div>
    <div id="hubList"></div>
  </section>

  <section id="gate" style="display:none;">
    <div id="gatePrompt"></div>
    <button id="gateYes" class="hubcard"></button>
    <button id="gateNo" class="hubcard"></button>
  </section>
</div>
<div id="glow" style="position:fixed; inset:0; pointer-events:none; opacity:0; z-index:60; background:radial-gradient(circle at 50% 42%, rgba(227,165,66,.5), rgba(227,165,66,0) 68%);"></div>
<div id="build"></div>

<script src="levels.js?v=1781878529"></script>
<script src="scenarios.js?v=1781878529"></script>
<script src="engine.js?v=1781878529"></script>
<script src="version.js?v=1781878529"></script>
</body>
</html>
